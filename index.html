<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具箱 | 实用小工具集合</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🧰 工具箱</h1>
            <p class="subtitle">实用、便捷的在线工具集合</p>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- 搜索和筛选区域 -->
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索工具..." class="search-input">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="filter-tags" id="filterTags">
                    <!-- 标签将通过 JS 动态生成 -->
                </div>
            </div>

            <!-- 统计信息 -->
            <div class="stats" id="stats">
                <!-- 统计信息将通过 JS 动态生成 -->
            </div>

            <!-- 工具网格 -->
            <div class="tools-grid" id="toolsGrid">
                <!-- 工具卡片将通过 JS 动态生成 -->
            </div>

            <!-- 空状态提示 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>未找到匹配的工具</h3>
                <p>尝试使用其他关键词搜索</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Built with ❤️ for GitHub Pages</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
