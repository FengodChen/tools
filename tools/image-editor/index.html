<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="imageEditor.title">图片编辑器 | Image Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="../../js/i18n.js"></script>
</head>
<body class="text-slate-700 p-4 md:p-8">
    <!-- Language Switcher Container -->
    <div class="language-switcher-container"></div>

    <div class="max-w-6xl mx-auto">
        <!-- Back Link -->
        <a href="../../index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors mb-6">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span data-i18n="imageEditor.backToHome">返回首页</span>
        </a>

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent" data-i18n="imageEditor.title">
                🖼️ 图片编辑器
            </h1>
            <p class="text-slate-500 text-lg" data-i18n="imageEditor.subtitle">简单易用的在线图片编辑工具，支持裁剪、旋转、翻转等功能</p>
        </div>

        <!-- Main Content -->
        <div class="glass-panel rounded-2xl shadow-2xl p-6 md:p-8 mb-6">
            
            <!-- Toolbar -->
            <div class="flex flex-wrap gap-3 mb-6 justify-center">
                <label class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg cursor-pointer">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span data-i18n="imageEditor.buttons.upload">上传图片</span>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                </label>

                <button onclick="pasteFromClipboard()" class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    <span data-i18n="imageEditor.buttons.paste">粘贴 (Ctrl+V)</span>
                </button>

                <button onclick="copyToClipboard()" id="copyBtn" class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                    </svg>
                    <span data-i18n="imageEditor.buttons.copy">复制到剪贴板</span>
                </button>

                <button onclick="downloadImage()" id="downloadBtn" class="bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    <span data-i18n="imageEditor.buttons.download">下载图片</span>
                </button>

                <button onclick="resetImage()" id="resetBtn" class="bg-slate-600 hover:bg-slate-500 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    <span data-i18n="imageEditor.buttons.reset">重置</span>
                </button>

                <button onclick="undo()" id="undoBtn" class="bg-orange-600 hover:bg-orange-500 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path>
                    </svg>
                    <span data-i18n="imageEditor.buttons.undo">撤销</span>
                </button>
            </div>

            <!-- Editor Tools -->
            <div class="grid lg:grid-cols-4 gap-6 mb-6">
                <!-- Left Panel: Tools -->
                <div class="space-y-4">
                    <!-- Transform Tools -->
                    <div class="tool-group">
                        <div class="tool-group-title" data-i18n="imageEditor.tools.transform.title">变换</div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="rotate(-90)" id="rotateLeftBtn" class="btn-tool px-3 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-1" disabled>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path>
                                </svg>
                                <span data-i18n="imageEditor.tools.rotate.left">左旋</span>
                            </button>
                            <button onclick="rotate(90)" id="rotateRightBtn" class="btn-tool px-3 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-1" disabled>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2m18-10l-6 6m6-6l-6-6"></path>
                                </svg>
                                <span data-i18n="imageEditor.tools.rotate.right">右旋</span>
                            </button>
                            <button onclick="flip('horizontal')" id="flipHBtn" class="btn-tool px-3 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-1" disabled>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                                </svg>
                                <span data-i18n="imageEditor.tools.flip.horizontal">水平翻转</span>
                            </button>
                            <button onclick="flip('vertical')" id="flipVBtn" class="btn-tool px-3 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-1" disabled>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
                                </svg>
                                <span data-i18n="imageEditor.tools.flip.vertical">垂直翻转</span>
                            </button>
                        </div>
                    </div>

                    <!-- Crop Tool -->
                    <div class="tool-group">
                        <div class="tool-group-title" data-i18n="imageEditor.tools.crop.title">裁剪</div>
                        <div class="space-y-2">
                            <button onclick="toggleCropMode()" id="cropBtn" class="btn-tool w-full px-3 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2" disabled>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                                </svg>
                                <span data-i18n="imageEditor.tools.crop.start">开始裁剪</span>
                            </button>
                            <div id="cropActions" class="hidden grid grid-cols-2 gap-2">
                                <button onclick="applyCrop()" class="btn-primary text-white px-3 py-2 rounded-lg text-sm font-medium">
                                    <span data-i18n="imageEditor.tools.crop.apply">应用</span>
                                </button>
                                <button onclick="cancelCrop()" class="btn-secondary px-3 py-2 rounded-lg text-sm font-medium">
                                    <span data-i18n="imageEditor.tools.crop.cancel">取消</span>
                                </button>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="setCropRatio(1)" id="ratio1Btn" class="btn-tool px-2 py-1 rounded text-xs" disabled>1:1</button>
                                <button onclick="setCropRatio(4/3)" id="ratio43Btn" class="btn-tool px-2 py-1 rounded text-xs" disabled>4:3</button>
                                <button onclick="setCropRatio(16/9)" id="ratio169Btn" class="btn-tool px-2 py-1 rounded text-xs" disabled>16:9</button>
                                <button onclick="setCropRatio(null)" id="ratioFreeBtn" class="btn-tool px-2 py-1 rounded text-xs active" data-i18n="imageEditor.tools.crop.freeRatio">自由</button>
                            </div>
                        </div>
                    </div>

                    <!-- Resize Tool -->
                    <div class="tool-group">
                        <div class="tool-group-title" data-i18n="imageEditor.tools.resize.title">调整大小</div>
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <label class="text-xs text-slate-500 w-12" data-i18n="imageEditor.tools.resize.width">宽度</label>
                                <input type="number" id="resizeWidth" class="flex-1 bg-white border border-slate-300 rounded-lg px-2 py-1 text-sm" onchange="updateResizeHeight()" disabled>
                            </div>
                            <div class="flex items-center gap-2">
                                <label class="text-xs text-slate-500 w-12" data-i18n="imageEditor.tools.resize.height">高度</label>
                                <input type="number" id="resizeHeight" class="flex-1 bg-white border border-slate-300 rounded-lg px-2 py-1 text-sm" onchange="updateResizeWidth()" disabled>
                            </div>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="keepRatio" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                                <span class="text-xs text-slate-600" data-i18n="imageEditor.tools.resize.keepRatio">保持比例</span>
                            </label>
                            <button onclick="applyResize()" id="resizeBtn" class="btn-primary w-full text-white px-3 py-2 rounded-lg text-sm font-medium" disabled>
                                <span data-i18n="imageEditor.tools.resize.apply">应用调整</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Canvas -->
                <div class="lg:col-span-3">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                            <span data-i18n="imageEditor.canvas.title">画布</span>
                        </h3>
                        <span id="imageInfo" class="text-xs text-slate-400 font-mono"></span>
                    </div>
                    <div class="canvas-container rounded-xl overflow-hidden relative flex items-center justify-center" style="min-height: 400px;" id="canvasContainer">
                        <canvas id="editorCanvas" class="max-w-full max-h-[500px] object-contain hidden"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none" id="canvasPlaceholder">
                            <svg class="w-16 h-16 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <p class="text-sm" data-i18n="imageEditor.canvas.placeholder">点击上传或拖拽图片到此处</p>
                        </div>
                        
                        <!-- Crop Overlay Container -->
                        <div id="cropOverlayContainer" class="crop-overlay-container hidden">
                            <!-- Dark masks around crop area -->
                            <div id="cropMaskTop" class="crop-mask crop-mask-top"></div>
                            <div id="cropMaskBottom" class="crop-mask crop-mask-bottom"></div>
                            <div id="cropMaskLeft" class="crop-mask crop-mask-left"></div>
                            <div id="cropMaskRight" class="crop-mask crop-mask-right"></div>
                            
                            <!-- Crop Selection Area -->
                            <div id="cropSelection" class="crop-selection hidden">
                                <div class="crop-info" id="cropInfo">0 x 0</div>
                                <!-- Resize handles -->
                                <div class="crop-handle nw" data-handle="nw"></div>
                                <div class="crop-handle ne" data-handle="ne"></div>
                                <div class="crop-handle sw" data-handle="sw"></div>
                                <div class="crop-handle se" data-handle="se"></div>
                                <div class="crop-handle n" data-handle="n"></div>
                                <div class="crop-handle s" data-handle="s"></div>
                                <div class="crop-handle w" data-handle="w"></div>
                                <div class="crop-handle e" data-handle="e"></div>
                            </div>
                            
                            <!-- Hint message -->
                            <div id="cropHint" class="crop-hint" data-i18n="imageEditor.crop.hint">按住鼠标拖动选择裁剪区域</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="flex justify-between items-center text-sm text-slate-500 border-t border-slate-200 pt-4">
                <div id="statusText" data-i18n="imageEditor.status.waiting">等待上传图片...</div>
                <div class="flex gap-4">
                    <span id="zoomInfo"></span>
                </div>
            </div>
        </div>

        <!-- Tips -->
        <div class="grid md:grid-cols-3 gap-4 text-sm">
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-blue-600 mb-2" data-i18n="imageEditor.tips.crop.title">✂️ 自由裁剪</h4>
                <p class="text-slate-600" data-i18n="imageEditor.tips.crop.content">点击裁剪按钮后，在图片上按住鼠标拖动即可选择裁剪区域</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-purple-600 mb-2" data-i18n="imageEditor.tips.transform.title">🔄 快速变换</h4>
                <p class="text-slate-600" data-i18n="imageEditor.tips.transform.content">支持左旋、右旋、水平翻转、垂直翻转等多种变换操作</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-green-600 mb-2" data-i18n="imageEditor.tips.privacy.title">✨ 隐私保护</h4>
                <p class="text-slate-600" data-i18n="imageEditor.tips.privacy.content">所有处理在本地浏览器完成，图片不会上传到服务器</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 bg-white border border-slate-200 text-slate-800 px-6 py-3 rounded-xl shadow-2xl transform translate-x-full transition-transform duration-300 z-[110] flex items-center gap-3 hidden">
        <span id="toastIcon" class="text-xl">ℹ️</span>
        <span id="toastMessage" data-i18n="imageEditor.toast.message">提示信息</span>
    </div>

    <script src="main.js"></script>
</body>
</html>
