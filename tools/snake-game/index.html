<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="snake.title">🐍 贪食蛇游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="../../js/i18n.js"></script>
</head>
<body class="text-slate-700 p-4 md:p-8">
    <!-- Loading Screen -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" data-i18n="snake.loading">加载 Rust WASM 模块中...</div>
    </div>

    <div class="max-w-4xl mx-auto relative">
        <!-- Language Switcher -->
        <div class="language-switcher-container"></div>

        <!-- Back Link -->
        <a href="../../index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors mb-6">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span data-i18n="back">返回首页</span>
        </a>

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent" data-i18n="snake.title">
                🐍 贪食蛇游戏
            </h1>
            <p class="text-slate-500 text-lg" data-i18n="snake.subtitle">使用 Rust + WebAssembly 开发的高性能贪食蛇小游戏</p>
        </div>

        <!-- Stats Bar -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="stat-box">
                <div class="stat-label" data-i18n="snake.score">得分</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label" data-i18n="snake.length">长度</div>
                <div class="stat-value" id="lengthDisplay">3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label" data-i18n="snake.highScore">最高分</div>
                <div class="stat-value" id="highScoreDisplay">0</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="glass-panel rounded-2xl shadow-2xl p-6 md:p-8">
            <!-- Game Canvas -->
            <div class="game-canvas-container mb-6 mx-auto" style="width: fit-content;">
                <canvas id="gameCanvas"></canvas>
            </div>

            <!-- Control Buttons -->
            <div class="flex flex-wrap gap-3 justify-center mb-8">
                <button id="pauseBtn" class="btn-warning text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span data-i18n="snake.buttons.pause">暂停</span>
                </button>
                
                <button id="restartBtn" class="btn-success text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    <span data-i18n="snake.buttons.restart">重新开始</span>
                </button>
            </div>

            <!-- Touch Controls -->
            <div class="flex justify-center mb-8">
                <div class="grid grid-cols-3 gap-2">
                    <div></div>
                    <button class="control-btn up" data-key="ArrowUp">↑</button>
                    <div></div>
                    <button class="control-btn left" data-key="ArrowLeft">←</button>
                    <button class="control-btn down" data-key="ArrowDown">↓</button>
                    <button class="control-btn right" data-key="ArrowRight">→</button>
                </div>
            </div>

            <!-- Instructions -->
            <div class="bg-slate-100 p-6 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-blue-600 mb-4 flex items-center gap-2 text-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span data-i18n="snake.controls.title">游戏说明</span>
                </h4>
                <div class="grid md:grid-cols-2 gap-4 text-sm text-slate-600">
                    <div class="space-y-2">
                        <p>• <span data-i18n="snake.controls.keyboard">使用方向键或 WASD 控制蛇的移动</span></p>
                        <p>• <span data-i18n="snake.controls.pauseKey">空格键暂停游戏</span></p>
                    </div>
                    <div class="space-y-2">
                        <p>• <span data-i18n="snake.controls.goal">吃掉红色食物增长得分，不要撞到自己！</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 bg-white border border-slate-200 text-slate-800 px-6 py-3 rounded-xl shadow-2xl transform translate-x-full transition-transform duration-300 z-[110] flex items-center gap-3 hidden">
        <span id="toastIcon" class="text-xl">ℹ️</span>
        <span id="toastMessage">提示信息</span>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
