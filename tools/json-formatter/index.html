<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="jsonFormatter.title">JSON 格式化工具 | JSON Formatter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/i18n.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #334155;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        textarea.form-control {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            line-height: 1.6;
        }

        /* Custom scrollbar for light theme */
        textarea::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        textarea::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        textarea::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Language Switcher Styles */
        .language-switcher-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
        }

        .language-switcher {
            position: relative;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 0.75rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            font-weight: 500;
            color: #475569;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }

        .lang-icon {
            font-size: 1rem;
        }

        .lang-arrow {
            font-size: 0.625rem;
            transition: transform 0.3s ease;
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            min-width: 140px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .lang-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .lang-option {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            text-align: left;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            color: #475569;
            transition: all 0.2s ease;
        }

        .lang-option:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .lang-option.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body class="text-slate-700 p-4 md:p-8">
    <!-- Language Switcher Container -->
    <div class="language-switcher-container"></div>

    <div class="max-w-7xl mx-auto">
        <!-- Back Link -->
        <a href="../../index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors mb-4">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span data-i18n="jsonFormatter.backToHome">返回首页</span>
        </a>

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent" data-i18n="jsonFormatter.title">
                📋 JSON 格式化工具
            </h1>
            <p class="text-slate-500 text-lg" data-i18n="jsonFormatter.subtitle">JSON 格式化、美化和压缩工具，支持语法校验</p>
        </div>

        <!-- Main Content -->
        <div class="glass-panel rounded-2xl shadow-2xl p-6 md:p-8 mb-6">
            <!-- Toolbar -->
            <div class="flex flex-wrap gap-3 mb-6 justify-center">
                <button onclick="formatJSON(2)" class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    <span data-i18n="jsonFormatter.buttons.format2">格式化 (2空格)</span>
                </button>
                
                <button onclick="formatJSON(4)" class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span data-i18n="jsonFormatter.buttons.format4">4空格缩进</span>
                </button>

                <button onclick="minifyJSON()" class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <span data-i18n="jsonFormatter.buttons.minify">压缩</span>
                </button>

                <button onclick="validateJSON()" class="btn-secondary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span data-i18n="jsonFormatter.buttons.validate">校验</span>
                </button>

                <button onclick="clearAll()" class="btn-secondary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    <span data-i18n="jsonFormatter.buttons.clear">清空</span>
                </button>

                <button onclick="loadExample()" class="btn-secondary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span data-i18n="jsonFormatter.buttons.loadExample">加载示例</span>
                </button>
            </div>

            <!-- Split Layout -->
            <div class="grid lg:grid-cols-2 gap-6">
                <!-- Input Panel -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-slate-500 rounded-full"></span>
                            <span data-i18n="jsonFormatter.input.title">输入 JSON</span>
                        </h3>
                        <div class="flex gap-2">
                            <button onclick="copyInput()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                <span data-i18n="jsonFormatter.buttons.copy">复制</span>
                            </button>
                            <button onclick="pasteInput()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                                <span data-i18n="jsonFormatter.buttons.paste">粘贴</span>
                            </button>
                        </div>
                    </div>
                    <textarea id="inputJson" class="form-control w-full bg-white border border-slate-300 rounded-xl p-4 text-slate-700 text-sm focus:outline-none focus:border-blue-500 transition-colors resize-y" style="min-height: 400px;" data-i18n-placeholder="jsonFormatter.input.placeholder" placeholder='{"key": "value", "number": 123}'></textarea>
                </div>

                <!-- Output Panel -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                            <span data-i18n="jsonFormatter.output.title">输出结果</span>
                        </h3>
                        <div class="flex gap-2">
                            <button onclick="copyOutput()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                <span data-i18n="jsonFormatter.buttons.copy">复制</span>
                            </button>
                            <button onclick="downloadJSON()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                <span data-i18n="jsonFormatter.buttons.download">下载</span>
                            </button>
                        </div>
                    </div>
                    <textarea id="outputJson" class="form-control w-full bg-white border border-slate-300 rounded-xl p-4 text-slate-700 text-sm focus:outline-none focus:border-blue-500 transition-colors resize-y" style="min-height: 400px;" data-i18n-placeholder="jsonFormatter.output.placeholder" placeholder="格式化后的结果将显示在这里..." readonly></textarea>
                </div>
            </div>

            <!-- Message -->
            <div id="message"></div>

            <!-- Stats Bar -->
            <div id="statsBar" class="mt-6 flex flex-wrap justify-between items-center text-sm text-slate-500 border-t border-slate-200 pt-4" style="display: none;">
                <div class="flex gap-6">
                    <span class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <span data-i18n="jsonFormatter.stats.charCount">字符数:</span> <span id="charCount" class="text-slate-700 font-mono">0</span>
                    </span>
                    <span class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                        <span data-i18n="jsonFormatter.stats.size">大小:</span> <span id="byteSize" class="text-slate-700 font-mono">0</span> <span data-i18n="jsonFormatter.stats.bytes">B</span>
                    </span>
                    <span class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7h1a2 2 0 012 2v5.5a1.5 1.5 0 01-3 0V7zM12 7h1v6h-1V7zM9 7h1v6H9V7z"></path></svg>
                        <span data-i18n="jsonFormatter.stats.keyCount">键数:</span> <span id="keyCount" class="text-slate-700 font-mono">0</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- Tips -->
        <div class="grid md:grid-cols-3 gap-4 text-sm">
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-blue-600 mb-2" data-i18n="jsonFormatter.tips.tip1Title">💡 使用技巧</h4>
                <p class="text-slate-600" data-i18n="jsonFormatter.tips.tip1Desc">支持快捷键 Ctrl+V 直接粘贴 JSON 内容，快速开始格式化</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-purple-600 mb-2" data-i18n="jsonFormatter.tips.tip2Title">✨ 智能校验</h4>
                <p class="text-slate-600" data-i18n="jsonFormatter.tips.tip2Desc">自动检测 JSON 语法错误，精确定位问题所在位置</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-green-600 mb-2" data-i18n="jsonFormatter.tips.tip3Title">🔒 隐私保护</h4>
                <p class="text-slate-600" data-i18n="jsonFormatter.tips.tip3Desc">所有处理在本地浏览器完成，数据不会上传到服务器</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 bg-white border border-slate-200 text-slate-800 px-6 py-3 rounded-xl shadow-2xl transform translate-x-full transition-transform duration-300 z-[110] flex items-center gap-3 hidden">
        <span id="toastIcon" class="text-xl">ℹ️</span>
        <span id="toastMessage" data-i18n="jsonFormatter.toast.message">提示信息</span>
    </div>

    <script>
        // Initialize i18n
        document.addEventListener('DOMContentLoaded', async function() {
            await I18N.init();
            I18N.initLanguageSwitcher('.language-switcher-container');
        });

        function formatJSON(spaces) {
            const input = document.getElementById('inputJson').value;
            const output = document.getElementById('outputJson');
            
            try {
                if (!input.trim()) {
                    showToast(I18N.t('jsonFormatter.toast.emptyInput'), 'error');
                    return;
                }
                
                const obj = JSON.parse(input);
                output.value = JSON.stringify(obj, null, spaces);
                updateStats(output.value);
                showToast(I18N.t('jsonFormatter.toast.formatSuccess'), 'success');
            } catch (e) {
                showToast(I18N.t('jsonFormatter.toast.parseError', { message: e.message }), 'error');
            }
        }
        
        function minifyJSON() {
            const input = document.getElementById('inputJson').value;
            const output = document.getElementById('outputJson');
            
            try {
                if (!input.trim()) {
                    showToast(I18N.t('jsonFormatter.toast.emptyInput'), 'error');
                    return;
                }
                
                const obj = JSON.parse(input);
                output.value = JSON.stringify(obj);
                updateStats(output.value);
                showToast(I18N.t('jsonFormatter.toast.minifySuccess'), 'success');
            } catch (e) {
                showToast(I18N.t('jsonFormatter.toast.parseError', { message: e.message }), 'error');
            }
        }
        
        function validateJSON() {
            const input = document.getElementById('inputJson').value;
            
            try {
                if (!input.trim()) {
                    showToast(I18N.t('jsonFormatter.toast.emptyInput'), 'error');
                    return;
                }
                
                JSON.parse(input);
                showToast(I18N.t('jsonFormatter.toast.validateSuccess'), 'success');
            } catch (e) {
                showToast(I18N.t('jsonFormatter.toast.parseError', { message: e.message }), 'error');
            }
        }
        
        function clearAll() {
            document.getElementById('inputJson').value = '';
            document.getElementById('outputJson').value = '';
            document.getElementById('message').innerHTML = '';
            document.getElementById('statsBar').style.display = 'none';
            showToast(I18N.t('jsonFormatter.toast.cleared'), 'info');
        }
        
        function loadExample() {
            const example = {
                "name": "张三",
                "age": 28,
                "email": "zhangsan@example.com",
                "address": {
                    "city": "北京",
                    "zipcode": "100000"
                },
                "hobbies": ["阅读", "音乐", "编程"],
                "isActive": true
            };
            document.getElementById('inputJson').value = JSON.stringify(example, null, 2);
            showToast(I18N.t('jsonFormatter.toast.exampleLoaded'), 'success');
        }
        
        async function copyInput() {
            const input = document.getElementById('inputJson');
            if (!input.value) {
                showToast(I18N.t('jsonFormatter.toast.nothingToCopy'), 'error');
                return;
            }
            await copyToClipboard(input.value);
        }
        
        async function copyOutput() {
            const output = document.getElementById('outputJson');
            if (!output.value) {
                showToast(I18N.t('jsonFormatter.toast.nothingToCopy'), 'error');
                return;
            }
            await copyToClipboard(output.value);
        }
        
        async function pasteInput() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputJson').value = text;
                showToast(I18N.t('jsonFormatter.toast.pasted'), 'success');
            } catch (e) {
                showToast(I18N.t('jsonFormatter.toast.clipboardError'), 'error');
            }
        }
        
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(I18N.t('jsonFormatter.toast.copySuccess'), 'success');
            } catch (e) {
                showToast(I18N.t('jsonFormatter.toast.copyError'), 'error');
            }
        }
        
        function downloadJSON() {
            const output = document.getElementById('outputJson').value;
            if (!output) {
                showToast(I18N.t('jsonFormatter.toast.nothingToDownload'), 'error');
                return;
            }
            
            const blob = new Blob([output], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'formatted.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(I18N.t('jsonFormatter.toast.downloadSuccess'), 'success');
        }
        
        function updateStats(json) {
            document.getElementById('charCount').textContent = json.length;
            document.getElementById('byteSize').textContent = new Blob([json]).size;
            
            try {
                const obj = JSON.parse(json);
                const keys = countKeys(obj);
                document.getElementById('keyCount').textContent = keys;
            } catch (e) {
                document.getElementById('keyCount').textContent = 0;
            }
            
            document.getElementById('statsBar').style.display = 'flex';
        }
        
        function countKeys(obj) {
            let count = 0;
            for (const key in obj) {
                count++;
                if (typeof obj[key] === 'object' && obj[key] !== null) {
                    count += countKeys(obj[key]);
                }
            }
            return count;
        }
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            icon.textContent = icons[type] || icons.info;
            msg.textContent = message;
            
            toast.classList.remove('hidden');
            toast.classList.remove('translate-x-full');
            
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                // 等待动画完成后隐藏
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 300);
            }, 3000);
        }

        // 全局粘贴监听
        document.addEventListener('paste', (e) => {
            const activeElement = document.activeElement;
            if (activeElement.id !== 'inputJson') {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type === 'text/plain') {
                        item.getAsString((text) => {
                            document.getElementById('inputJson').value = text;
                            showToast(I18N.t('jsonFormatter.toast.autoPasted'), 'success');
                        });
                        break;
                    }
                }
            }
        });
    </script>
</body>
</html>
