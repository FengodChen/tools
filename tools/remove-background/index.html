<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>透明背景转换器 Pro | Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/i18n.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-700 p-4 md:p-8">
    <!-- Language Switcher Container -->
    <div class="language-switcher-container"></div>

    <div class="max-w-6xl mx-auto">
        <!-- Back Link -->
        <a href="../../index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors mb-6">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span data-i18n="removeBackground.backToHome">返回首页</span>
        </a>

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent" data-i18n="removeBackground.title">
                🎨 透明背景转换器 Pro
            </h1>
            <p class="text-slate-500 text-lg" data-i18n="removeBackground.subtitle">智能去除白色/纯色背景，完美支持剪贴板操作</p>
        </div>

        <!-- Main Content -->
        <div class="glass-panel rounded-2xl shadow-2xl p-6 md:p-8 mb-6">
            
            <!-- Toolbar -->
            <div class="flex flex-wrap gap-3 mb-6 justify-center">
                <button onclick="pasteFromClipboard()" class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    <span data-i18n="removeBackground.buttons.paste">粘贴 (Ctrl+V)</span>
                </button>
                
                <label class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg cursor-pointer">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span data-i18n="removeBackground.buttons.upload">上传图片</span>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                </label>

                <button onclick="copyToClipboard()" id="copyBtn" class="bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    <span data-i18n="removeBackground.buttons.copyResult">复制结果</span>
                </button>

                <button onclick="downloadImage()" id="downloadBtn" class="bg-slate-600 hover:bg-slate-500 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span data-i18n="removeBackground.buttons.download">下载 PNG</span>
                </button>
            </div>

            <!-- Settings Panel -->
            <div class="bg-slate-100 rounded-xl p-4 mb-6 border border-slate-200">
                <div class="grid md:grid-cols-4 gap-4 items-start">
                    <!-- Tolerance -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center h-5">
                            <label class="text-slate-700 font-medium text-sm" data-i18n="removeBackground.settings.tolerance.label">颜色容差</label>
                            <span id="toleranceValue" class="text-blue-600 font-mono text-sm">30</span>
                        </div>
                        <div class="h-[42px] flex items-center">
                            <input type="range" id="tolerance" min="0" max="100" value="30" class="slider w-full" oninput="updateSettings()">
                        </div>
                        <p class="text-xs text-slate-400 h-4" data-i18n="removeBackground.settings.tolerance.hint">数值越大，去除范围越广</p>
                    </div>

                    <!-- Mode -->
                    <div class="space-y-2">
                        <label class="text-slate-700 font-medium text-sm block h-5" data-i18n="removeBackground.settings.mode.label">去除模式</label>
                        <select id="removeMode" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-700 focus:outline-none focus:border-blue-500 h-[42px]" onchange="updateSettings()">
                            <option value="white" data-i18n="removeBackground.settings.mode.white">白色背景</option>
                            <option value="color" data-i18n="removeBackground.settings.mode.color">指定颜色</option>
                            <option value="auto" data-i18n="removeBackground.settings.mode.auto">自动检测</option>
                        </select>
                    </div>

                    <!-- Color Picker (hidden by default) -->
                    <div class="space-y-2" id="colorPickerContainer" style="display: none;">
                        <label class="text-slate-700 font-medium text-sm block h-5" data-i18n="removeBackground.settings.targetColor.label">目标颜色</label>
                        <div class="flex gap-2 h-[42px] items-center">
                            <div class="color-picker-wrapper w-10 h-10 rounded-lg border-2 border-slate-600 overflow-hidden shrink-0" style="background-color: #ffffff;">
                                <input type="color" id="targetColor" value="#ffffff" onchange="updateSettings()">
                            </div>
                            <input type="text" id="colorHex" value="#FFFFFF" class="w-16 bg-white border border-slate-300 rounded-lg px-2 py-2 text-sm uppercase text-slate-700 h-10" onchange="updateColorFromHex()">
                            <button onclick="startColorPicking()" id="pickColorBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-1 h-10 shrink-0" data-i18n-title="removeBackground.settings.targetColor.picker">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                                <span data-i18n="removeBackground.settings.targetColor.picker">取色</span>
                            </button>
                        </div>
                        <p id="pickColorHint" class="text-xs text-blue-600 hidden h-4" data-i18n="removeBackground.toast.pickColorHint">点击原始图片选取颜色</p>
                    </div>

                    <!-- Options -->
                    <div class="space-y-2">
                        <label class="text-slate-700 font-medium text-sm block h-5" data-i18n="removeBackground.settings.options.label">选项</label>
                        <div class="flex flex-col gap-2 h-[42px] justify-center">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="feather" checked onchange="updateSettings()" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 bg-white">
                                <span class="text-sm text-slate-600" data-i18n="removeBackground.settings.options.feather">边缘羽化</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="invert" onchange="updateSettings()" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 bg-white">
                                <span class="text-sm text-slate-600" data-i18n="removeBackground.settings.options.invert">反转选择</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="grid lg:grid-cols-2 gap-6">
                <!-- Original -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-slate-500 rounded-full"></span>
                            <span data-i18n="removeBackground.panels.original.title">原始图片</span>
                        </h3>
                        <span id="originalInfo" class="text-xs text-slate-400 font-mono"></span>
                    </div>
                    <div class="canvas-container rounded-xl overflow-hidden relative" style="min-height: 400px;" id="originalContainer">
                        <canvas id="originalCanvas" class="w-full h-full object-contain hidden"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none" id="originalPlaceholder">
                            <svg class="w-16 h-16 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <p class="text-sm" data-i18n="removeBackground.panels.original.placeholder">按 Ctrl+V 粘贴图片</p>
                        </div>
                    </div>
                </div>

                <!-- Result -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                            <span data-i18n="removeBackground.panels.result.title">透明背景</span>
                        </h3>
                        <span id="resultInfo" class="text-xs text-slate-400 font-mono"></span>
                    </div>
                    <div class="checkerboard rounded-xl overflow-hidden relative border-2 border-slate-700" style="min-height: 400px;" id="resultContainer">
                        <canvas id="resultCanvas" class="w-full h-full object-contain hidden"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none bg-slate-200/50" id="resultPlaceholder">
                            <svg class="w-16 h-16 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                            <p class="text-sm" data-i18n="removeBackground.panels.result.placeholder">处理后的图片</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="mt-6 flex justify-between items-center text-sm text-slate-500 border-t border-slate-200 pt-4">
                <div id="statusText" data-i18n="removeBackground.status.waiting">等待输入...</div>
                <div class="flex gap-4">
                    <span id="pixelInfo"></span>
                </div>
            </div>
        </div>

        <!-- Tips -->
        <div class="grid md:grid-cols-3 gap-4 text-sm">
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-blue-600 mb-2" data-i18n="removeBackground.tips.usage.title">💡 使用技巧</h4>
                <p class="text-slate-600" data-i18n="removeBackground.tips.usage.content">如果背景去除不干净，尝试调高"颜色容差"数值（建议 20-50）</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-purple-600 mb-2" data-i18n="removeBackground.tips.formats.title">🎨 支持格式</h4>
                <p class="text-slate-600" data-i18n="removeBackground.tips.formats.content">支持 JPG、PNG、GIF、WebP 等常见格式，输出为透明 PNG</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-green-600 mb-2" data-i18n="removeBackground.tips.privacy.title">✨ 隐私保护</h4>
                <p class="text-slate-600" data-i18n="removeBackground.tips.privacy.content">所有处理在本地浏览器完成，图片不会上传到服务器</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 bg-white border border-slate-200 text-slate-800 px-6 py-3 rounded-xl shadow-2xl transform translate-x-full transition-transform duration-300 z-[110] flex items-center gap-3 hidden">
        <span id="toastIcon" class="text-xl">ℹ️</span>
        <span id="toastMessage" data-i18n="removeBackground.toast.copied">提示信息</span>
    </div>

    <!-- Color Preview for Picking -->
    <div id="colorPreview" class="color-preview" data-color=""></div>

    <script src="main.js"></script>
</body>
</html>
