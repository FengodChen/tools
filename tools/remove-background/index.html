<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>透明背景转换器 Pro | Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/i18n.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .checkerboard {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .canvas-container {
            background: #ffffff;
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }

        .canvas-container:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.03);
        }

        .canvas-container.has-image {
            border-style: solid;
            border-color: #e2e8f0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .color-picker-wrapper {
            position: relative;
            overflow: hidden;
        }

        .color-picker-wrapper input[type="color"] {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            cursor: pointer;
            opacity: 0;
        }

        .picking-cursor {
            cursor: crosshair !important;
        }

        .picking-overlay {
            position: absolute;
            inset: 0;
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            border-radius: 0.75rem;
            pointer-events: none;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .color-preview {
            position: fixed;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 1000;
            display: none;
            background-size: cover;
        }

        .color-preview::after {
            content: attr(data-color);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            white-space: nowrap;
        }

        /* Language Switcher Styles */
        .language-switcher-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 100;
        }

        .language-switcher {
            position: relative;
        }

        .language-switcher .lang-btn {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: #334155;
            transition: all 0.2s ease;
        }

        .language-switcher .lang-btn:hover {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }

        .language-switcher .lang-icon {
            font-size: 1rem;
        }

        .language-switcher .lang-arrow {
            font-size: 0.625rem;
            transition: transform 0.2s ease;
        }

        .language-switcher .lang-dropdown.show + .lang-btn .lang-arrow,
        .language-switcher .lang-dropdown.show ~ .lang-btn .lang-arrow,
        .language-switcher:has(.lang-dropdown.show) .lang-arrow {
            transform: rotate(180deg);
        }

        .language-switcher .lang-dropdown {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border-radius: 0.75rem;
            padding: 0.5rem;
            min-width: 140px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
        }

        .language-switcher .lang-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .language-switcher .lang-option {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: transparent;
            text-align: left;
            font-size: 0.875rem;
            color: #475569;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .language-switcher .lang-option:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .language-switcher .lang-option.active {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            font-weight: 500;
        }
    </style>
</head>
<body class="text-slate-700 p-4 md:p-8">
    <!-- Language Switcher Container -->
    <div class="language-switcher-container"></div>

    <div class="max-w-6xl mx-auto">
        <!-- Back Link -->
        <a href="../../index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors mb-6">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span data-i18n="removeBackground.backToHome">返回首页</span>
        </a>

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent" data-i18n="removeBackground.title">
                🎨 透明背景转换器 Pro
            </h1>
            <p class="text-slate-500 text-lg" data-i18n="removeBackground.subtitle">智能去除白色/纯色背景，完美支持剪贴板操作</p>
        </div>

        <!-- Main Content -->
        <div class="glass-panel rounded-2xl shadow-2xl p-6 md:p-8 mb-6">
            
            <!-- Toolbar -->
            <div class="flex flex-wrap gap-3 mb-6 justify-center">
                <button onclick="pasteFromClipboard()" class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    <span data-i18n="removeBackground.buttons.paste">粘贴 (Ctrl+V)</span>
                </button>
                
                <label class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg cursor-pointer">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span data-i18n="removeBackground.buttons.upload">上传图片</span>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                </label>

                <button onclick="copyToClipboard()" id="copyBtn" class="bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    <span data-i18n="removeBackground.buttons.copyResult">复制结果</span>
                </button>

                <button onclick="downloadImage()" id="downloadBtn" class="bg-slate-600 hover:bg-slate-500 disabled:bg-slate-300 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg transition-all" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span data-i18n="removeBackground.buttons.download">下载 PNG</span>
                </button>
            </div>

            <!-- Settings Panel -->
            <div class="bg-slate-100 rounded-xl p-4 mb-6 border border-slate-200">
                <div class="grid md:grid-cols-4 gap-4 items-start">
                    <!-- Tolerance -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center h-5">
                            <label class="text-slate-700 font-medium text-sm" data-i18n="removeBackground.settings.tolerance.label">颜色容差</label>
                            <span id="toleranceValue" class="text-blue-600 font-mono text-sm">30</span>
                        </div>
                        <div class="h-[42px] flex items-center">
                            <input type="range" id="tolerance" min="0" max="100" value="30" class="slider w-full" oninput="updateSettings()">
                        </div>
                        <p class="text-xs text-slate-400 h-4" data-i18n="removeBackground.settings.tolerance.hint">数值越大，去除范围越广</p>
                    </div>

                    <!-- Mode -->
                    <div class="space-y-2">
                        <label class="text-slate-700 font-medium text-sm block h-5" data-i18n="removeBackground.settings.mode.label">去除模式</label>
                        <select id="removeMode" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-700 focus:outline-none focus:border-blue-500 h-[42px]" onchange="updateSettings()">
                            <option value="white" data-i18n="removeBackground.settings.mode.white">白色背景</option>
                            <option value="color" data-i18n="removeBackground.settings.mode.color">指定颜色</option>
                            <option value="auto" data-i18n="removeBackground.settings.mode.auto">自动检测</option>
                        </select>
                    </div>

                    <!-- Color Picker (hidden by default) -->
                    <div class="space-y-2" id="colorPickerContainer" style="display: none;">
                        <label class="text-slate-700 font-medium text-sm block h-5" data-i18n="removeBackground.settings.targetColor.label">目标颜色</label>
                        <div class="flex gap-2 h-[42px] items-center">
                            <div class="color-picker-wrapper w-10 h-10 rounded-lg border-2 border-slate-600 overflow-hidden shrink-0" style="background-color: #ffffff;">
                                <input type="color" id="targetColor" value="#ffffff" onchange="updateSettings()">
                            </div>
                            <input type="text" id="colorHex" value="#FFFFFF" class="w-16 bg-white border border-slate-300 rounded-lg px-2 py-2 text-sm uppercase text-slate-700 h-10" onchange="updateColorFromHex()">
                            <button onclick="startColorPicking()" id="pickColorBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-1 h-10 shrink-0" data-i18n-title="removeBackground.settings.targetColor.picker">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                                <span data-i18n="removeBackground.settings.targetColor.picker">取色</span>
                            </button>
                        </div>
                        <p id="pickColorHint" class="text-xs text-blue-600 hidden h-4" data-i18n="removeBackground.toast.pickColorHint">点击原始图片选取颜色</p>
                    </div>

                    <!-- Options -->
                    <div class="space-y-2">
                        <label class="text-slate-700 font-medium text-sm block h-5" data-i18n="removeBackground.settings.options.label">选项</label>
                        <div class="flex flex-col gap-2 h-[42px] justify-center">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="feather" checked onchange="updateSettings()" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 bg-white">
                                <span class="text-sm text-slate-600" data-i18n="removeBackground.settings.options.feather">边缘羽化</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="invert" onchange="updateSettings()" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 bg-white">
                                <span class="text-sm text-slate-600" data-i18n="removeBackground.settings.options.invert">反转选择</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="grid lg:grid-cols-2 gap-6">
                <!-- Original -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-slate-500 rounded-full"></span>
                            <span data-i18n="removeBackground.panels.original.title">原始图片</span>
                        </h3>
                        <span id="originalInfo" class="text-xs text-slate-400 font-mono"></span>
                    </div>
                    <div class="canvas-container rounded-xl overflow-hidden relative" style="min-height: 400px;" id="originalContainer">
                        <canvas id="originalCanvas" class="w-full h-full object-contain hidden"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none" id="originalPlaceholder">
                            <svg class="w-16 h-16 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <p class="text-sm" data-i18n="removeBackground.panels.original.placeholder">按 Ctrl+V 粘贴图片</p>
                        </div>
                    </div>
                </div>

                <!-- Result -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                            <span data-i18n="removeBackground.panels.result.title">透明背景</span>
                        </h3>
                        <span id="resultInfo" class="text-xs text-slate-400 font-mono"></span>
                    </div>
                    <div class="checkerboard rounded-xl overflow-hidden relative border-2 border-slate-700" style="min-height: 400px;" id="resultContainer">
                        <canvas id="resultCanvas" class="w-full h-full object-contain hidden"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none bg-slate-200/50" id="resultPlaceholder">
                            <svg class="w-16 h-16 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                            <p class="text-sm" data-i18n="removeBackground.panels.result.placeholder">处理后的图片</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="mt-6 flex justify-between items-center text-sm text-slate-500 border-t border-slate-200 pt-4">
                <div id="statusText" data-i18n="removeBackground.status.waiting">等待输入...</div>
                <div class="flex gap-4">
                    <span id="pixelInfo"></span>
                </div>
            </div>
        </div>

        <!-- Tips -->
        <div class="grid md:grid-cols-3 gap-4 text-sm">
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-blue-600 mb-2" data-i18n="removeBackground.tips.usage.title">💡 使用技巧</h4>
                <p class="text-slate-600" data-i18n="removeBackground.tips.usage.content">如果背景去除不干净，尝试调高"颜色容差"数值（建议 20-50）</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-purple-600 mb-2" data-i18n="removeBackground.tips.formats.title">🎨 支持格式</h4>
                <p class="text-slate-600" data-i18n="removeBackground.tips.formats.content">支持 JPG、PNG、GIF、WebP 等常见格式，输出为透明 PNG</p>
            </div>
            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                <h4 class="font-semibold text-green-600 mb-2" data-i18n="removeBackground.tips.privacy.title">✨ 隐私保护</h4>
                <p class="text-slate-600" data-i18n="removeBackground.tips.privacy.content">所有处理在本地浏览器完成，图片不会上传到服务器</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 bg-white border border-slate-200 text-slate-800 px-6 py-3 rounded-xl shadow-2xl transform translate-x-full transition-transform duration-300 z-[110] flex items-center gap-3 hidden">
        <span id="toastIcon" class="text-xl">ℹ️</span>
        <span id="toastMessage" data-i18n="removeBackground.toast.copied">提示信息</span>
    </div>

    <!-- Color Preview for Picking -->
    <div id="colorPreview" class="color-preview" data-color=""></div>

    <script>
        let originalImage = null;
        let originalImageData = null;
        let isProcessing = false;
        let isPickingColor = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化 i18n
            I18N.init().then(() => {
                I18N.initLanguageSwitcher('.language-switcher-container');
            });

            // 全局粘贴监听
            document.addEventListener('paste', handleGlobalPaste);
            
            // 拖拽支持
            setupDragDrop();
        });

        function handleGlobalPaste(e) {
            e.preventDefault();
            const items = e.clipboardData.items;
            
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const blob = item.getAsFile();
                    loadImage(blob);
                    showToast(I18N.t('removeBackground.toast.pasted'), 'success');
                    return;
                }
            }
        }

        function setupDragDrop() {
            const containers = [document.getElementById('originalContainer'), document.getElementById('resultContainer')];
            
            containers.forEach(container => {
                container.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    container.style.borderColor = '#667eea';
                    container.style.background = 'rgba(102, 126, 234, 0.1)';
                });
                
                container.addEventListener('dragleave', () => {
                    container.style.borderColor = '';
                    container.style.background = '';
                });
                
                container.addEventListener('drop', (e) => {
                    e.preventDefault();
                    container.style.borderColor = '';
                    container.style.background = '';
                    const files = e.dataTransfer.files;
                    if (files.length > 0 && files[0].type.startsWith('image/')) {
                        loadImage(files[0]);
                    }
                });
            });
        }

        async function pasteFromClipboard() {
            try {
                const clipboardItems = await navigator.clipboard.read();
                for (const item of clipboardItems) {
                    for (const type of item.types) {
                        if (type.startsWith('image/')) {
                            const blob = await item.getType(type);
                            await loadImage(blob);
                            showToast(I18N.t('removeBackground.toast.readClipboard'), 'success');
                            return;
                        }
                    }
                }
                showToast(I18N.t('removeBackground.toast.noImage'), 'warning');
            } catch (err) {
                showToast(I18N.t('removeBackground.toast.useCtrlV'), 'info');
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) loadImage(file);
        }

        function loadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        originalImage = img;
                        displayOriginal(img);
                        processImage();
                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function displayOriginal(img) {
            const canvas = document.getElementById('originalCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布尺寸（限制最大尺寸以保证性能）
            const maxSize = 2000;
            let width = img.width;
            let height = img.height;
            
            if (width > maxSize || height > maxSize) {
                const ratio = Math.min(maxSize / width, maxSize / height);
                width *= ratio;
                height *= ratio;
            }
            
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            // 保存原始数据
            originalImageData = ctx.getImageData(0, 0, width, height);
            
            // 更新 UI
            canvas.classList.remove('hidden');
            document.getElementById('originalPlaceholder').classList.add('hidden');
            document.getElementById('originalContainer').classList.add('has-image');
            document.getElementById('originalInfo').textContent = `${Math.round(width)}×${Math.round(height)}`;
            document.getElementById('statusText').textContent = I18N.t('removeBackground.status.processing');
        }

        function updateSettings() {
            const mode = document.getElementById('removeMode').value;
            const colorContainer = document.getElementById('colorPickerContainer');
            
            if (mode === 'color') {
                colorContainer.style.display = 'block';
            } else {
                colorContainer.style.display = 'none';
            }
            
            document.getElementById('toleranceValue').textContent = document.getElementById('tolerance').value;
            
            if (originalImage) {
                processImage();
            }
        }

        function updateColorFromHex() {
            const hex = document.getElementById('colorHex').value;
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                document.getElementById('targetColor').value = hex;
                document.querySelector('.color-picker-wrapper').style.backgroundColor = hex;
                processImage();
            }
        }

        function processImage() {
            if (!originalImageData || isProcessing) return;
            isProcessing = true;
            
            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置尺寸
            canvas.width = originalImageData.width;
            canvas.height = originalImageData.height;
            
            // 复制原始数据
            const newImageData = new ImageData(
                new Uint8ClampedArray(originalImageData.data),
                originalImageData.width,
                originalImageData.height
            );
            
            const data = newImageData.data;
            const mode = document.getElementById('removeMode').value;
            const tolerance = parseInt(document.getElementById('tolerance').value);
            const feather = document.getElementById('feather').checked;
            const invert = document.getElementById('invert').checked;
            
            // 获取目标颜色
            let targetR = 255, targetG = 255, targetB = 255;
            if (mode === 'color') {
                const hex = document.getElementById('targetColor').value;
                targetR = parseInt(hex.slice(1, 3), 16);
                targetG = parseInt(hex.slice(3, 5), 16);
                targetB = parseInt(hex.slice(5, 7), 16);
            } else if (mode === 'auto') {
                // 自动检测四角颜色作为背景
                const corners = [
                    0, 
                    (originalImageData.width - 1) * 4,
                    (originalImageData.height - 1) * originalImageData.width * 4,
                    (originalImageData.height - 1) * originalImageData.width * 4 + (originalImageData.width - 1) * 4
                ];
                let avgR = 0, avgG = 0, avgB = 0;
                corners.forEach(idx => {
                    avgR += data[idx];
                    avgG += data[idx + 1];
                    avgB += data[idx + 2];
                });
                targetR = avgR / 4;
                targetG = avgG / 4;
                targetB = avgB / 4;
            }
            
            // 处理像素
            let transparentPixels = 0;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // 计算颜色距离
                const distance = Math.sqrt(
                    Math.pow(r - targetR, 2) + 
                    Math.pow(g - targetG, 2) + 
                    Math.pow(b - targetB, 2)
                );
                
                // 判断是否匹配目标颜色
                let isMatch = distance <= tolerance;
                if (invert) isMatch = !isMatch;
                
                if (isMatch) {
                    if (feather && distance > tolerance * 0.5) {
                        // 羽化边缘：根据距离计算透明度
                        const alpha = Math.min(255, Math.max(0, (distance - tolerance * 0.5) / (tolerance * 0.5) * 255));
                        data[i + 3] = alpha;
                    } else {
                        // 完全透明
                        data[i + 3] = 0;
                        transparentPixels++;
                    }
                }
            }
            
            // 将处理后的数据绘制到画布
            ctx.putImageData(newImageData, 0, 0);
            
            // 更新 UI
            canvas.classList.remove('hidden');
            document.getElementById('resultPlaceholder').classList.add('hidden');
            document.getElementById('resultInfo').textContent = `${canvas.width}×${canvas.height}`;
            document.getElementById('copyBtn').disabled = false;
            document.getElementById('downloadBtn').disabled = false;
            
            const totalPixels = canvas.width * canvas.height;
            const percent = ((transparentPixels / totalPixels) * 100).toFixed(1);
            document.getElementById('statusText').textContent = I18N.t('removeBackground.status.completed', { percent: percent });
            document.getElementById('pixelInfo').textContent = I18N.t('removeBackground.status.transparentPixels', { count: transparentPixels.toLocaleString() });
            
            isProcessing = false;
        }

        async function copyToClipboard() {
            const canvas = document.getElementById('resultCanvas');
            
            try {
                canvas.toBlob(async (blob) => {
                    if (!blob) {
                        showToast(I18N.t('removeBackground.toast.copyError'), 'error');
                        return;
                    }
                    
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        showToast(I18N.t('removeBackground.toast.copied'), 'success');
                    } catch (err) {
                        console.error('Clipboard error:', err);
                        showToast(I18N.t('removeBackground.toast.copyError'), 'error');
                    }
                }, 'image/png');
            } catch (err) {
                showToast(I18N.t('removeBackground.toast.copyError'), 'error');
            }
        }

        function downloadImage() {
            const canvas = document.getElementById('resultCanvas');
            const link = document.createElement('a');
            link.download = `transparent_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast(I18N.t('removeBackground.toast.downloadStarted'), 'success');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            icon.textContent = icons[type] || icons.info;
            msg.textContent = message;
            
            // 移除 hidden 类，然后滑入显示
            toast.classList.remove('hidden');
            toast.classList.remove('translate-x-full');
            
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                // 等待动画完成后隐藏
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 300);
            }, 3000);
        }

        // 颜色选择器同步
        document.getElementById('targetColor').addEventListener('input', (e) => {
            document.querySelector('.color-picker-wrapper').style.backgroundColor = e.target.value;
            document.getElementById('colorHex').value = e.target.value.toUpperCase();
            processImage();
        });

        // 从图片选取颜色功能
        function startColorPicking() {
            if (!originalImage) {
                showToast(I18N.t('removeBackground.toast.uploadFirst'), 'warning');
                return;
            }
            
            isPickingColor = true;
            const container = document.getElementById('originalContainer');
            const canvas = document.getElementById('originalCanvas');
            const hint = document.getElementById('pickColorHint');
            const btn = document.getElementById('pickColorBtn');
            const preview = document.getElementById('colorPreview');
            
            // 添加视觉反馈
            container.classList.add('picking-cursor');
            hint.classList.remove('hidden');
            btn.classList.add('bg-red-600', 'hover:bg-red-700');
            btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> ' + I18N.t('removeBackground.buttons.paste');
            btn.onclick = stopColorPicking;
            
            // 添加叠加层动画
            let overlay = container.querySelector('.picking-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'picking-overlay';
                container.appendChild(overlay);
            }
            
            // 绑定点击事件
            canvas.addEventListener('click', handleColorPick);
            canvas.addEventListener('mousemove', handleColorPreview);
            document.addEventListener('keydown', handlePickKeydown);
            
            showToast(I18N.t('removeBackground.toast.pickColorHint'), 'info');
        }
        
        function stopColorPicking() {
            isPickingColor = false;
            const container = document.getElementById('originalContainer');
            const canvas = document.getElementById('originalCanvas');
            const hint = document.getElementById('pickColorHint');
            const btn = document.getElementById('pickColorBtn');
            const preview = document.getElementById('colorPreview');
            
            container.classList.remove('picking-cursor');
            hint.classList.add('hidden');
            btn.classList.remove('bg-red-600', 'hover:bg-red-700');
            btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg> ' + I18N.t('removeBackground.settings.targetColor.picker');
            btn.onclick = startColorPicking;
            
            // 移除叠加层
            const overlay = container.querySelector('.picking-overlay');
            if (overlay) overlay.remove();
            
            // 隐藏预览
            preview.style.display = 'none';
            
            // 解绑事件
            canvas.removeEventListener('click', handleColorPick);
            canvas.removeEventListener('mousemove', handleColorPreview);
            document.removeEventListener('keydown', handlePickKeydown);
        }
        
        function handlePickKeydown(e) {
            if (e.key === 'Escape') {
                stopColorPicking();
            }
        }
        
        function handleColorPreview(e) {
            if (!isPickingColor || !originalImageData) return;
            
            const canvas = document.getElementById('originalCanvas');
            const preview = document.getElementById('colorPreview');
            const rect = canvas.getBoundingClientRect();
            
            // 计算实际缩放比例
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            // 获取鼠标在 canvas 上的坐标
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            
            // 检查边界
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) {
                preview.style.display = 'none';
                return;
            }
            
            // 获取颜色
            const pixelIndex = (y * canvas.width + x) * 4;
            const r = originalImageData.data[pixelIndex];
            const g = originalImageData.data[pixelIndex + 1];
            const b = originalImageData.data[pixelIndex + 2];
            const hex = rgbToHex(r, g, b);
            
            // 更新预览
            preview.style.display = 'block';
            preview.style.left = (e.clientX + 15) + 'px';
            preview.style.top = (e.clientY + 15) + 'px';
            preview.style.backgroundColor = hex;
            preview.setAttribute('data-color', hex.toUpperCase());
        }
        
        function handleColorPick(e) {
            if (!isPickingColor || !originalImageData) return;
            
            const canvas = document.getElementById('originalCanvas');
            const rect = canvas.getBoundingClientRect();
            
            // 计算实际缩放比例
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            // 获取点击位置在 canvas 上的坐标
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            
            // 检查边界
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;
            
            // 获取颜色
            const pixelIndex = (y * canvas.width + x) * 4;
            const r = originalImageData.data[pixelIndex];
            const g = originalImageData.data[pixelIndex + 1];
            const b = originalImageData.data[pixelIndex + 2];
            const hex = rgbToHex(r, g, b);
            
            // 设置为目标颜色
            document.getElementById('targetColor').value = hex;
            document.querySelector('.color-picker-wrapper').style.backgroundColor = hex;
            document.getElementById('colorHex').value = hex.toUpperCase();
            
            // 切换到指定颜色模式
            document.getElementById('removeMode').value = 'color';
            document.getElementById('colorPickerContainer').style.display = 'block';
            
            // 重新处理图片
            processImage();
            
            // 停止取色模式
            stopColorPicking();
            
            showToast(I18N.t('removeBackground.toast.colorPicked', { color: hex.toUpperCase() }), 'success');
        }
        
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }
    </script>
</body>
