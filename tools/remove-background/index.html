<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="智能图片背景去除工具，支持白色/纯色背景去除，本地处理保护隐私">
    <title>🖼️ 背景去除工具</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .tool-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9375rem;
            margin-bottom: 24px;
            transition: color var(--transition-fast);
        }
        
        .back-link:hover {
            color: var(--primary-hover);
        }
        
        .tool-header-detail {
            margin-bottom: 32px;
        }
        
        .tool-header-detail h1 {
            font-size: 1.75rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .tool-header-detail p {
            color: var(--text-secondary);
        }
        
        .tool-content {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 32px;
            border: 1px solid var(--border-color);
        }
        
        /* 工具栏 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: var(--border-color);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: #16a34a;
            color: white;
        }
        
        .btn-success:hover:not(:disabled) {
            background: #15803d;
        }
        
        /* 设置面板 */
        .settings-panel {
            background: var(--bg-secondary);
            border-radius: var(--border-radius-md);
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .setting-item label {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        
        .setting-item label.checkbox {
            flex-direction: row;
            align-items: center;
            display: flex;
            gap: 8px;
            cursor: pointer;
        }
        
        .setting-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }
        
        .setting-item select,
        .setting-item input[type="text"] {
            padding: 10px 12px;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            font-size: 0.9375rem;
            background: var(--bg-card);
            outline: none;
            transition: border-color var(--transition-fast);
        }
        
        .setting-item select:focus,
        .setting-item input[type="text"]:focus {
            border-color: var(--primary-color);
        }
        
        /* 滑块 */
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .slider-value {
            font-family: monospace;
            color: var(--primary-color);
            font-weight: 600;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast);
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        /* 颜色选择器 */
        .color-picker-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .color-picker-wrapper {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            border: 2px solid var(--border-color);
            cursor: pointer;
        }
        
        .color-picker-wrapper input[type="color"] {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            cursor: pointer;
            opacity: 0;
        }
        
        /* 画布区域 */
        .canvas-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 20px;
        }
        
        .canvas-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        
        .panel-title.active::before {
            background: #16a34a;
        }
        
        .panel-info {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        .canvas-container {
            position: relative;
            min-height: 350px;
            background: var(--bg-secondary);
            border: 2px dashed var(--border-color);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            transition: all var(--transition-fast);
        }
        
        .canvas-container:hover {
            border-color: var(--primary-color);
        }
        
        .canvas-container.has-image {
            border-style: solid;
            border-color: var(--border-color);
        }
        
        .canvas-container.drag-over {
            border-color: var(--primary-color);
            background: var(--primary-light);
        }
        
        canvas {
            display: block;
            max-width: 100%;
            max-height: 500px;
            margin: 0 auto;
        }
        
        .canvas-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 20px;
        }
        
        .canvas-placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* 透明背景格子 */
        .checkerboard {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        
        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        /* 提示卡片 */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        
        .tip-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius-md);
            padding: 16px;
            border: 1px solid var(--border-color);
        }
        
        .tip-card h4 {
            font-size: 0.9375rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tip-card p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 16px 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast-icon {
            font-size: 1.25rem;
        }
        
        /* 隐藏的文件输入 */
        .file-input {
            display: none;
        }
        
        @media (max-width: 768px) {
            .tool-content {
                padding: 20px;
            }
            
            .canvas-area {
                grid-template-columns: 1fr;
            }
            
            .toolbar {
                flex-direction: column;
            }
            
            .toolbar .btn {
                width: 100%;
                justify-content: center;
            }
            
            .canvas-container {
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="tool-page">
        <a href="../../index.html" class="back-link">← 返回工具箱</a>
        
        <div class="tool-header-detail">
            <h1>🖼️ 背景去除工具</h1>
            <p>智能去除图片白色/纯色背景，支持剪贴板操作，本地处理保护隐私</p>
        </div>
        
        <div class="tool-content">
            <!-- 工具栏 -->
            <div class="toolbar">
                <button class="btn btn-primary" onclick="pasteFromClipboard()">
                    <span>📋</span> 粘贴图片 (Ctrl+V)
                </button>
                
                <label class="btn btn-secondary" style="cursor: pointer;">
                    <span>📁</span> 上传图片
                    <input type="file" class="file-input" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
                </label>
                
                <button class="btn btn-success" id="copyBtn" onclick="copyToClipboard()" disabled>
                    <span>📋</span> 复制结果
                </button>
                
                <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()" disabled>
                    <span>⬇️</span> 下载 PNG
                </button>
            </div>
            
            <!-- 设置面板 -->
            <div class="settings-panel">
                <div class="settings-grid">
                    <!-- 颜色容差 -->
                    <div class="setting-item">
                        <div class="slider-container">
                            <div class="slider-header">
                                <label>颜色容差</label>
                                <span class="slider-value" id="toleranceValue">30</span>
                            </div>
                            <input type="range" id="tolerance" min="0" max="100" value="30" oninput="updateSettings()">
                        </div>
                    </div>
                    
                    <!-- 去除模式 -->
                    <div class="setting-item">
                        <label>去除模式</label>
                        <select id="removeMode" onchange="updateSettings()">
                            <option value="white">白色背景</option>
                            <option value="color">指定颜色</option>
                            <option value="auto">自动检测</option>
                        </select>
                    </div>
                    
                    <!-- 颜色选择器 -->
                    <div class="setting-item" id="colorPickerContainer" style="display: none;">
                        <label>目标颜色</label>
                        <div class="color-picker-row">
                            <div class="color-picker-wrapper" style="background-color: #ffffff;" id="colorPreview">
                                <input type="color" id="targetColor" value="#ffffff" onchange="updateSettings()">
                            </div>
                            <input type="text" id="colorHex" value="#FFFFFF" style="flex: 1;" onchange="updateColorFromHex()">
                        </div>
                    </div>
                    
                    <!-- 选项 -->
                    <div class="setting-item" style="flex-direction: row; gap: 20px; align-items: flex-end;">
                        <label class="checkbox">
                            <input type="checkbox" id="feather" checked onchange="updateSettings()">
                            <span>边缘羽化</span>
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" id="invert" onchange="updateSettings()">
                            <span>反转选择</span>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- 画布区域 -->
            <div class="canvas-area">
                <div class="canvas-panel">
                    <div class="panel-header">
                        <span class="panel-title" id="originalTitle">原始图片</span>
                        <span class="panel-info" id="originalInfo"></span>
                    </div>
                    <div class="canvas-container" id="originalContainer">
                        <canvas id="originalCanvas" class="hidden"></canvas>
                        <div class="canvas-placeholder" id="originalPlaceholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <p>拖拽图片到此处<br>或按 Ctrl+V 粘贴</p>
                        </div>
                    </div>
                </div>
                
                <div class="canvas-panel">
                    <div class="panel-header">
                        <span class="panel-title active" id="resultTitle">透明背景</span>
                        <span class="panel-info" id="resultInfo"></span>
                    </div>
                    <div class="canvas-container checkerboard" id="resultContainer">
                        <canvas id="resultCanvas" class="hidden"></canvas>
                        <div class="canvas-placeholder" id="resultPlaceholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                            </svg>
                            <p>处理后的图片将显示在这里</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 状态栏 -->
            <div class="status-bar">
                <span id="statusText">等待输入...</span>
                <span id="pixelInfo"></span>
            </div>
        </div>
        
        <!-- 提示卡片 -->
        <div class="tips-grid">
            <div class="tip-card">
                <h4><span>💡</span> 使用技巧</h4>
                <p>如果背景去除不干净，尝试调高"颜色容差"数值（建议 20-50）</p>
            </div>
            <div class="tip-card">
                <h4><span>🎨</span> 支持格式</h4>
                <p>支持 JPG、PNG、GIF、WebP 等常见格式，输出为透明 PNG</p>
            </div>
            <div class="tip-card">
                <h4><span>🔒</span> 隐私保护</h4>
                <p>所有处理在本地浏览器完成，图片不会上传到服务器</p>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">ℹ️</span>
        <span id="toastMessage">提示信息</span>
    </div>
    
    <script>
        let originalImage = null;
        let originalImageData = null;
        let isProcessing = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('paste', handleGlobalPaste);
            setupDragDrop();
        });

        function handleGlobalPaste(e) {
            e.preventDefault();
            const items = e.clipboardData.items;
            
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const blob = item.getAsFile();
                    loadImage(blob);
                    showToast('✅ 已从剪贴板粘贴图片', 'success');
                    return;
                }
            }
        }

        function setupDragDrop() {
            const containers = ['originalContainer', 'resultContainer'];
            
            containers.forEach(id => {
                const container = document.getElementById(id);
                
                container.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    container.classList.add('drag-over');
                });
                
                container.addEventListener('dragleave', () => {
                    container.classList.remove('drag-over');
                });
                
                container.addEventListener('drop', (e) => {
                    e.preventDefault();
                    container.classList.remove('drag-over');
                    const files = e.dataTransfer.files;
                    if (files.length > 0 && files[0].type.startsWith('image/')) {
                        loadImage(files[0]);
                    }
                });
            });
        }

        async function pasteFromClipboard() {
            try {
                const clipboardItems = await navigator.clipboard.read();
                for (const item of clipboardItems) {
                    for (const type of item.types) {
                        if (type.startsWith('image/')) {
                            const blob = await item.getType(type);
                            await loadImage(blob);
                            showToast('✅ 读取剪贴板成功', 'success');
                            return;
                        }
                    }
                }
                showToast('⚠️ 剪贴板中没有图片', 'warning');
            } catch (err) {
                showToast('请直接按 Ctrl+V 粘贴图片', 'info');
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) loadImage(file);
        }

        function loadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        originalImage = img;
                        displayOriginal(img);
                        processImage();
                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function displayOriginal(img) {
            const canvas = document.getElementById('originalCanvas');
            const ctx = canvas.getContext('2d');
            
            // 限制最大尺寸
            const maxSize = 2000;
            let width = img.width;
            let height = img.height;
            
            if (width > maxSize || height > maxSize) {
                const ratio = Math.min(maxSize / width, maxSize / height);
                width *= ratio;
                height *= ratio;
            }
            
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            originalImageData = ctx.getImageData(0, 0, width, height);
            
            // 更新 UI
            canvas.classList.remove('hidden');
            document.getElementById('originalPlaceholder').classList.add('hidden');
            document.getElementById('originalContainer').classList.add('has-image');
            document.getElementById('originalTitle').classList.add('active');
            document.getElementById('originalInfo').textContent = `${Math.round(width)}×${Math.round(height)}`;
            document.getElementById('statusText').textContent = '已加载图片，正在处理...';
        }

        function updateSettings() {
            const mode = document.getElementById('removeMode').value;
            const colorContainer = document.getElementById('colorPickerContainer');
            
            colorContainer.style.display = mode === 'color' ? 'block' : 'none';
            document.getElementById('toleranceValue').textContent = document.getElementById('tolerance').value;
            
            if (originalImage) {
                processImage();
            }
        }

        function updateColorFromHex() {
            const hex = document.getElementById('colorHex').value;
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                document.getElementById('targetColor').value = hex;
                document.getElementById('colorPreview').style.backgroundColor = hex;
                processImage();
            }
        }

        function processImage() {
            if (!originalImageData || isProcessing) return;
            isProcessing = true;
            
            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = originalImageData.width;
            canvas.height = originalImageData.height;
            
            const newImageData = new ImageData(
                new Uint8ClampedArray(originalImageData.data),
                originalImageData.width,
                originalImageData.height
            );
            
            const data = newImageData.data;
            const mode = document.getElementById('removeMode').value;
            const tolerance = parseInt(document.getElementById('tolerance').value);
            const feather = document.getElementById('feather').checked;
            const invert = document.getElementById('invert').checked;
            
            let targetR = 255, targetG = 255, targetB = 255;
            
            if (mode === 'color') {
                const hex = document.getElementById('targetColor').value;
                targetR = parseInt(hex.slice(1, 3), 16);
                targetG = parseInt(hex.slice(3, 5), 16);
                targetB = parseInt(hex.slice(5, 7), 16);
            } else if (mode === 'auto') {
                const corners = [
                    0, 
                    (originalImageData.width - 1) * 4,
                    (originalImageData.height - 1) * originalImageData.width * 4,
                    (originalImageData.height - 1) * originalImageData.width * 4 + (originalImageData.width - 1) * 4
                ];
                let avgR = 0, avgG = 0, avgB = 0;
                corners.forEach(idx => {
                    avgR += data[idx];
                    avgG += data[idx + 1];
                    avgB += data[idx + 2];
                });
                targetR = avgR / 4;
                targetG = avgG / 4;
                targetB = avgB / 4;
            }
            
            let transparentPixels = 0;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                const distance = Math.sqrt(
                    Math.pow(r - targetR, 2) + 
                    Math.pow(g - targetG, 2) + 
                    Math.pow(b - targetB, 2)
                );
                
                let isMatch = distance <= tolerance;
                if (invert) isMatch = !isMatch;
                
                if (isMatch) {
                    if (feather && distance > tolerance * 0.5) {
                        const alpha = Math.min(255, Math.max(0, (distance - tolerance * 0.5) / (tolerance * 0.5) * 255));
                        data[i + 3] = alpha;
                    } else {
                        data[i + 3] = 0;
                        transparentPixels++;
                    }
                }
            }
            
            ctx.putImageData(newImageData, 0, 0);
            
            // 更新 UI
            canvas.classList.remove('hidden');
            document.getElementById('resultPlaceholder').classList.add('hidden');
            document.getElementById('resultInfo').textContent = `${canvas.width}×${canvas.height}`;
            document.getElementById('copyBtn').disabled = false;
            document.getElementById('downloadBtn').disabled = false;
            
            const totalPixels = canvas.width * canvas.height;
            const percent = ((transparentPixels / totalPixels) * 100).toFixed(1);
            document.getElementById('statusText').textContent = `处理完成：已去除 ${percent}% 的像素`;
            document.getElementById('pixelInfo').textContent = `透明像素: ${transparentPixels.toLocaleString()}`;
            
            isProcessing = false;
        }

        async function copyToClipboard() {
            const canvas = document.getElementById('resultCanvas');
            
            try {
                canvas.toBlob(async (blob) => {
                    if (!blob) {
                        showToast('❌ 生成图片失败', 'error');
                        return;
                    }
                    
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        showToast('✅ 已复制到剪贴板！', 'success');
                    } catch (err) {
                        showToast('❌ 复制失败，请尝试下载', 'error');
                    }
                }, 'image/png');
            } catch (err) {
                showToast('❌ 浏览器不支持此功能', 'error');
            }
        }

        function downloadImage() {
            const canvas = document.getElementById('resultCanvas');
            const link = document.createElement('a');
            link.download = `transparent_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('⬇️ 下载已开始', 'success');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            icon.textContent = icons[type] || icons.info;
            msg.textContent = message;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 颜色选择器同步
        document.getElementById('targetColor').addEventListener('input', (e) => {
            document.getElementById('colorPreview').style.backgroundColor = e.target.value;
            document.getElementById('colorHex').value = e.target.value.toUpperCase();
            processImage();
        });
    </script>
</body>
</html>
